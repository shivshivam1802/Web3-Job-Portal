version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: web3_marketplace_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: web3_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: web3_marketplace_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web3_marketplace_api
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/web3_marketplace?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  pgdata:
  redisdata:
